name: Update victron_mqtt Dependency and Translations

on:
  schedule:
    - cron: '0 4 * * *' # Runs daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-victron-mqtt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Get latest victron_mqtt release
        id: get_release
        run: |
          latest=$(curl -s https://pypi.org/pypi/victron_mqtt/json | jq -r .info.version)
          echo "latest_version=$latest" >> $GITHUB_OUTPUT
          
          # Get release notes from GitHub (GitHub tags use 'v' prefix)
          release_notes=$(curl -s "https://api.github.com/repos/tomer-w/victron_mqtt/releases/tags/v$latest" | jq -r '.body // "No release notes available"')
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$release_notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check_update
        run: |
          current=$(jq -r '.requirements[0]' custom_components/victron_mqtt/manifest.json | cut -d'=' -f3)
          latest="${{ steps.get_release.outputs.latest_version }}"
          echo "Current: $current, Latest: $latest"
          if [ "$current" = "$latest" ]; then
            echo "No update needed."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Update needed."
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update dependency pins with new version
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          set -e
          latest="${{ steps.get_release.outputs.latest_version }}"

          # Pin integration runtime dependency.
          jq \
            --arg v "$latest" \
            '.requirements[0] = "victron_mqtt=="+$v' \
            custom_components/victron_mqtt/manifest.json > manifest.tmp && mv manifest.tmp custom_components/victron_mqtt/manifest.json

          # Pin local/dev test dependency.
          sed -i -E "s|^victron_mqtt(==[0-9][0-9A-Za-z.\-]*)?$|victron_mqtt==$latest|" requirements.txt

          # Ensure CI test job installs the same victron_mqtt version.
          python3 - <<'PY'
          from pathlib import Path
          import re

          latest = "${{ steps.get_release.outputs.latest_version }}"
          workflow = Path(".github/workflows/validate.yaml")
          text = workflow.read_text(encoding="utf-8")

          pattern = re.compile(r"(pip install [^\n]*?)victron_mqtt(?:==[^\s]+)?", re.MULTILINE)
          updated_text, count = pattern.subn(rf"\1victron_mqtt=={latest}", text, count=1)
          if count != 1:
              raise RuntimeError("Could not update victron_mqtt pin in .github/workflows/validate.yaml")

          workflow.write_text(updated_text, encoding="utf-8")
          PY

      - name: Download victron_mqtt release package from PyPI
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          latest="${{ steps.get_release.outputs.latest_version }}"
          sdist_url=$(curl -s "https://pypi.org/pypi/victron_mqtt/$latest/json" | jq -r '.urls[] | select(.packagetype == "sdist") | .url')
          curl -L -o "victron_mqtt-$latest.tar.gz" "$sdist_url"

      - name: Extract victron_mqtt.json from release package
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          set -e
          latest="${{ steps.get_release.outputs.latest_version }}"
          tar -xzf victron_mqtt-$latest.tar.gz victron_mqtt-$latest/victron_mqtt.json
          mv victron_mqtt-$latest/victron_mqtt.json victron_mqtt.json
          rm -rf victron_mqtt-$latest.tar.gz victron_mqtt-$latest/

      - name: Merge topics into en.json
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          python3 .github/scripts/merge_topics.py

      - name: Create Pull Request
        if: steps.check_update.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update/victron-mqtt-${{ steps.get_release.outputs.latest_version }}
          delete-branch: true
          title: "Update victron_mqtt to ${{ steps.get_release.outputs.latest_version }}"
          body: |
            ## Changes in victron_mqtt ${{ steps.get_release.outputs.latest_version }}
            
            ${{ steps.get_release.outputs.release_notes }}
          commit-message: |
            Update victron_mqtt to ${{ steps.get_release.outputs.latest_version }}
            
            ${{ steps.get_release.outputs.release_notes }}
          base: main
          labels: "dependencies"
